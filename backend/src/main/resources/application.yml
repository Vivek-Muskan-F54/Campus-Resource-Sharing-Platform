spring:
  application:
    name: ${APP_NAME:Campus Resource Sharing Platform Backend}
    version: ${APP_VERSION:1.0.0}
  config:
    import: optional:file:./.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

app:
  admin:
    email: ${APP_ADMIN_EMAIL}
    password: ${APP_ADMIN_PASSWORD}
  frontend-url: ${FRONTEND_URL:https://campus-resource-sharing-platform.vercel.app}
  mail:
    from: ${MAIL_FROM:no-reply@campusshare.local}
  auth:
    email-verification-expiration-ms: ${AUTH_EMAIL_VERIFICATION_EXPIRATION_MS:86400000}
    password-reset-expiration-ms: ${AUTH_PASSWORD_RESET_EXPIRATION_MS:1800000}
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://campus-resource-sharing-platform.vercel.app}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
    info:
      enabled: true
    metrics:
      enabled: true

info:
  application:
    name: ${APP_NAME:Campus Resource Sharing Platform Backend}
    version: ${APP_VERSION:1.0.0}
    environment: ${APP_ENV:local}

logging:
  level:
    root: INFO
    com.campusshare: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    com.cloudinary: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%t] %-40.40logger{39} : %m%n"
    file:    "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%t] %-40.40logger{39} : %m%n"
