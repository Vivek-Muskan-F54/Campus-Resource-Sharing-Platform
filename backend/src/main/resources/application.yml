server:
  port: ${SERVER_PORT:8080}
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_share?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
app:
  admin:
    email: ${APP_ADMIN_EMAIL:admin@campus.edu}
    password: ${APP_ADMIN_PASSWORD:ChangeMe123!}
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-to-at-least-32-characters}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# ── Logging ─────────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.campusshare: INFO
    # Reduce noise from third-party libraries
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    com.cloudinary: WARN
  pattern:
    # Structured log line: timestamp | level | thread | logger (short) | message
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%t] %-40.40logger{39} : %m%n"
    file:    "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%t] %-40.40logger{39} : %m%n"
  # Uncomment to persist logs to a rolling file in production:
  # file:
  #   name: logs/campusshare.log
  # logback:
  #   rollingpolicy:
  #     max-file-size: 50MB
  #     max-history: 30
